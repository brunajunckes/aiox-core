<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFlow Real-Time Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        h1 {
            color: #00d4ff;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .status-line {
            color: #7f5af0;
            font-size: 0.9em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 212, 255, 0.1);
        }

        .card h2 {
            color: #00d4ff;
            font-size: 1.1em;
            margin-bottom: 15px;
            border-bottom: 2px solid #7f5af0;
            padding-bottom: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px 0;
        }

        .metric-label {
            color: #a0a0ff;
        }

        .metric-value {
            color: #2ecc71;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f1419;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7f5af0);
            transition: width 0.3s ease;
        }

        .jobs-list {
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .job-item {
            background: #0f1419;
            border-left: 3px solid #7f5af0;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .job-id {
            color: #00d4ff;
            font-weight: bold;
        }

        .job-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .status-running {
            background: #f39c12;
            color: #000;
        }

        .status-completed {
            background: #2ecc71;
            color: #000;
        }

        .status-error {
            background: #e74c3c;
            color: #fff;
        }

        .status-queued {
            background: #3498db;
            color: #fff;
        }

        .timestamp {
            color: #666;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .error {
            color: #e74c3c;
        }

        .warning {
            color: #f39c12;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ AutoFlow Real-Time Monitor</h1>
            <div class="status-line">Live system metrics and job tracking</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>CPU Usage</h2>
                <div class="metric">
                    <span class="metric-label">Utilization</span>
                    <span class="metric-value" id="cpu-value">--</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cpu-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Memory</h2>
                <div class="metric">
                    <span class="metric-label">Used</span>
                    <span class="metric-value" id="mem-used">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Available</span>
                    <span class="metric-value" id="mem-avail">--</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="mem-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Disk Space</h2>
                <div class="metric">
                    <span class="metric-label">Used</span>
                    <span class="metric-value" id="disk-used">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Free</span>
                    <span class="metric-value" id="disk-free">--</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="disk-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Jobs Status</h2>
                <div class="metric">
                    <span class="metric-label">Total</span>
                    <span class="metric-value" id="jobs-total">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Running</span>
                    <span class="metric-value" id="jobs-running">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Completed</span>
                    <span class="metric-value" id="jobs-completed">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label error">Failed</span>
                    <span class="metric-value error" id="jobs-failed">0</span>
                </div>
            </div>
        </div>

        <div class="jobs-list">
            <h2 style="color: #00d4ff; margin-bottom: 15px;">Recent Jobs</h2>
            <div id="jobs-container">
                <div style="color: #666;">Waiting for job data...</div>
            </div>
        </div>

        <div class="timestamp" id="last-update">Last update: --</div>
    </div>

    <script>
        // Connect to stats stream
        const statsSource = new EventSource('/stream/stats');
        statsSource.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Update CPU
            document.getElementById('cpu-value').textContent = data.cpu.percent.toFixed(1) + '%';
            document.getElementById('cpu-bar').style.width = data.cpu.percent + '%';

            // Update Memory
            document.getElementById('mem-used').textContent = data.ram.used_gb + ' GB';
            document.getElementById('mem-avail').textContent = data.ram.available_gb + ' GB';
            document.getElementById('mem-bar').style.width = data.ram.percent + '%';

            // Update Disk
            document.getElementById('disk-used').textContent = data.disk.used_gb + ' GB';
            document.getElementById('disk-free').textContent = data.disk.free_gb + ' GB';
            document.getElementById('disk-bar').style.width = data.disk.percent + '%';

            // Update timestamp
            const time = new Date(data.timestamp).toLocaleTimeString();
            document.getElementById('last-update').textContent = 'Last update: ' + time;
        };

        statsSource.onerror = () => {
            console.error('Stats stream error');
        };

        // Connect to jobs stream
        const jobsSource = new EventSource('/stream/jobs');
        jobsSource.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Update job stats
            document.getElementById('jobs-total').textContent = data.stats.total;
            document.getElementById('jobs-running').textContent = data.stats.running;
            document.getElementById('jobs-completed').textContent = data.stats.completed;
            document.getElementById('jobs-failed').textContent = data.stats.failed;

            // Update jobs list
            const container = document.getElementById('jobs-container');
            if (data.jobs.length === 0) {
                container.innerHTML = '<div style="color: #666;">No jobs yet</div>';
            } else {
                container.innerHTML = data.jobs
                    .reverse()
                    .map(job => `
                        <div class="job-item">
                            <span class="job-id">${job.job_id}</span>
                            <span class="job-status status-${job.status}">${job.status}</span>
                            <div style="color: #a0a0ff; margin-top: 5px; font-size: 0.85em;">
                                ${job.workflow_type} • ${job.topic}
                            </div>
                        </div>
                    `)
                    .join('');
            }
        };

        jobsSource.onerror = () => {
            console.error('Jobs stream error');
        };
    </script>
</body>
</html>
