version: '3.9'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:16-alpine
    container_name: autoflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoflow-network
    restart: unless-stopped

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: autoflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoflow-network
    restart: unless-stopped

  # Ollama LLM Service (Production)
  ollama:
    image: ollama/ollama:latest
    container_name: autoflow-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - autoflow-network
    restart: unless-stopped

  # AutoFlow API (Production)
  autoflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoflow-api
    ports:
      - "8081:8080"
    environment:
      OLLAMA_URL: ${OLLAMA_URL}
      AUTOFLOW_DB_HOST: ${AUTOFLOW_DB_HOST}
      AUTOFLOW_DB_PORT: ${AUTOFLOW_DB_PORT}
      AUTOFLOW_DB_USER: ${AUTOFLOW_DB_USER}
      AUTOFLOW_DB_PASS: ${AUTOFLOW_DB_PASS}
      AUTOFLOW_DB_NAME: ${AUTOFLOW_DB_NAME}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/var/log/autoflow
      - ./cache:/var/cache/autoflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - autoflow-network
    restart: unless-stopped

  # Prometheus Monitoring (Production)
  prometheus:
    image: prom/prometheus:latest
    container_name: autoflow-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus-docker.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}'
      - '--scrape_interval=${PROMETHEUS_SCRAPE_INTERVAL}'
    depends_on:
      - autoflow
    networks:
      - autoflow-network
    restart: unless-stopped

  # Grafana Visualization (Production)
  grafana:
    image: grafana/grafana:latest
    container_name: autoflow-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP}
      GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - autoflow-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  autoflow-network:
    driver: bridge
