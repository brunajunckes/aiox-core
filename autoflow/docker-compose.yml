version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: autoflow-postgres
    environment:
      POSTGRES_DB: autoflow
      POSTGRES_USER: autoflow
      POSTGRES_PASSWORD: autoflow_secure_dev_only
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoflow-network

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: autoflow-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - autoflow-network

  # AutoFlow API
  autoflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoflow-api
    ports:
      - "8081:8080"
    environment:
      OLLAMA_URL: http://ollama:11434
      AUTOFLOW_DB_HOST: postgres
      AUTOFLOW_DB_PORT: 5432
      AUTOFLOW_DB_USER: autoflow
      AUTOFLOW_DB_PASS: autoflow_secure_dev_only
      AUTOFLOW_DB_NAME: autoflow
      API_HOST: 0.0.0.0
      API_PORT: 8080
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./logs:/var/log/autoflow
      - ./cache:/var/cache/autoflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - autoflow-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: autoflow-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus-docker.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - autoflow
    networks:
      - autoflow-network

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: autoflow-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - autoflow-network

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  autoflow-network:
    driver: bridge
