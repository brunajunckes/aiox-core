# Redis Configuration for AutoFlow Phase 3 (Job Queue + Caching)
# Generated: April 11, 2026
# Updated for: BullMQ + RQ job checkpointing, GPU metrics caching, cost aggregation

# ─────────────────────────────────────────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────────────────────────────────────────
bind 127.0.0.1
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
daemonize no

# ─────────────────────────────────────────────────────────────────────────────
# MEMORY & EVICTION
# ─────────────────────────────────────────────────────────────────────────────
# Max memory: 512MB for Phase 3 (job queue + cache)
maxmemory 512mb

# LRU eviction: when limit reached, remove least recently used keys
# Critical for job queue stability (old completed jobs cleaned up)
maxmemory-policy allkeys-lru

# Lazy eviction: don't block on eviction, do it in background
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ─────────────────────────────────────────────────────────────────────────────
# PERSISTENCE (AOF for job queue durability)
# ─────────────────────────────────────────────────────────────────────────────
# RDB snapshots (background saves)
save 900 1          # If 1+ keys changed in 900s, snapshot
save 300 10         # If 10+ keys changed in 300s, snapshot
save 60 10000       # If 10k+ keys changed in 60s, snapshot

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./

# AOF (Append-Only File) - ensures job queue durability
# Critical for Phase 3: losing jobs in progress = data loss
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec                  # Sync to disk every 1s (balances safety + performance)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ─────────────────────────────────────────────────────────────────────────────
# REPLICATION (Optional: for Phase 4 HA)
# ─────────────────────────────────────────────────────────────────────────────
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-disable-tcp-nodelay no
replica-serve-stale-data yes
replica-read-only yes
repl-ping-replica-period 10
repl-timeout 60

# ─────────────────────────────────────────────────────────────────────────────
# CLIENTS
# ─────────────────────────────────────────────────────────────────────────────
# Buffer limits for job queue connections
# Normal client: GPU workers, API
# Replica: future HA replicas
# Pubsub: monitoring + event streaming
maxclients 10000
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ─────────────────────────────────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
syslog-enabled no
syslog-ident redis
syslog-facility local0

# ─────────────────────────────────────────────────────────────────────────────
# SLOWLOG (Performance monitoring)
# ─────────────────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000  # Log commands slower than 10ms
slowlog-max-len 128            # Keep last 128 slow commands

# ─────────────────────────────────────────────────────────────────────────────
# EVENT NOTIFICATION
# ─────────────────────────────────────────────────────────────────────────────
# Enable key expiration events for job TTL cleanup
# K = keyspace, E = expired keys
notify-keyspace-events "Ex"

# ─────────────────────────────────────────────────────────────────────────────
# ADVANCED SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

activerehashing yes
client-query-buffer-limit 1gb
protocol-buffer-limit 1gb

# Min replicas online for writes (for Phase 4 HA)
min-replicas-to-write 0
min-replicas-max-lag 10

hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes

# ─────────────────────────────────────────────────────────────────────────────
# MODULE LOADING (Optional: Phase 4)
# ─────────────────────────────────────────────────────────────────────────────
# loadmodule /usr/lib/redis/modules/rejson.so
# loadmodule /usr/lib/redis/modules/graph.so

# ─────────────────────────────────────────────────────────────────────────────
# ACL (Authentication Control Lists)
# ─────────────────────────────────────────────────────────────────────────────
# Default: ACL file (Phase 4 security hardening)
# aclfile /etc/redis/users.acl

# Require password for default user (Phase 3+)
requirepass ${REDIS_PASSWORD:- }  # Set via environment in docker-compose

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 3 SPECIFIC TUNING
# ─────────────────────────────────────────────────────────────────────────────
# Optimized for BullMQ job queue:
# - AOF enabled: ensures job durability (no data loss on crash)
# - Memory limit: 512MB (covers ~50K-100K pending jobs + metrics cache)
# - LRU eviction: old completed jobs auto-cleaned
# - Slow log: monitor job queue performance (P99 latency)
# - Key expiration: TTL on artifacts, job metadata cleanup

# Connection pooling notes for applications:
# - GPU worker: 5-10 concurrent connections
# - API: 20-50 connections
# - Monitoring: 2-5 connections
# Total expected: ~100 concurrent clients (safe with maxclients 10000)
