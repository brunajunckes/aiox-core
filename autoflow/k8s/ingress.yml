apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoflow-ingress
  namespace: autoflow
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "10"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - autoflow.example.com
    - api.autoflow.example.com
    - monitoring.autoflow.example.com
    secretName: autoflow-tls
  rules:
  - host: autoflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: autoflow
            port:
              number: 80
  - host: api.autoflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: autoflow
            port:
              number: 80
  - host: monitoring.autoflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@autoflow.example.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
