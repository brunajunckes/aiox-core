apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoflow
  namespace: autoflow

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoflow
  namespace: autoflow
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoflow
  namespace: autoflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: autoflow
subjects:
- kind: ServiceAccount
  name: autoflow
  namespace: autoflow

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: autoflow-network-policy
  namespace: autoflow
spec:
  podSelector:
    matchLabels:
      app: autoflow
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: autoflow
    - podSelector:
        matchLabels:
          app: prometheus
    - podSelector:
        matchLabels:
          app: grafana
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: autoflow
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 11434
  - to:
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
