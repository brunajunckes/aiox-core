version: '3.8'

services:
  # Igreja Admin Dashboard - Next.js 14
  iglesia-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iglesia-admin
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CHIESA_ADDRESS=${CHIESA_ADDRESS:-0x0000000000000000000000000000000000000000}
      - NEXT_PUBLIC_CHAIN_ID=${CHAIN_ID:-11155111}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/igreja
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started
    networks:
      - igreja-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database (Supabase image)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-Igreja
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=igreja
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - igreja-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v2.10-alpine
    container_name: traefik-Igreja
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - igreja-network
    restart: unless-stopped

networks:
  igreja-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
